<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>경로 최적화</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">
    <aside class="left">
      <h1>경로 최적화</h1>
      <p class="hint">첫 번째 행은 시작지점입니다. (최대 15건)</p>

      <div id="rows"></div>

      <div class="actions">
        <button id="addBtn" type="button">+ 추가</button>
        <button id="optBtn" type="button">경로 최적화</button>
        <button id="shareBtn" type="button">모바일로 보내기(QR/링크)</button>
      </div>

      <div id="msg" class="msg"></div>

      <div id="progressWrap" class="progressWrap" hidden>
        <div class="spinner" aria-hidden="true"></div>
        <div>
          <div id="progressText" class="progressText">처리 중...</div>
          <div class="progressBar"><div id="progressBarFill" class="progressBarFill"></div></div>
        </div>
      </div>
    </aside>

    <main class="right">
      <div id="map" class="map"></div>

      <div class="topbar">
        <button id="naverBtn" type="button" disabled>네이버 지도 열기(다음 목적지)</button>
      </div>

      <div id="shareBox" class="shareBox" hidden>
        <div class="shareRow">
          <input id="shareUrl" readonly />
          <button id="copyBtn" type="button">복사</button>
        </div>
        <div id="qr"></div>
      </div>

      <div class="result">
        <h2>최적화 결과</h2>
        <ol id="resultList"></ol>
      </div>

      <div class="note">
        지도에는 최적화 경로가 표시됩니다. 모바일에서는 “다음 목적지” 버튼으로 네이버 지도 앱을 여세요.
      </div>
    </main>
  </div>

  <script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=ql4o2776tv"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
