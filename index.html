<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>경로 최적화</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">
    <aside class="left">
      <h1>경로 최적화</h1>
      <p class="hint">첫 번째 행은 시작지점입니다. (최대 15건)</p>

      <div id="rows"></div>

      <div class="actions">
        <button id="addBtn" type="button">+ 추가</button>
        <button id="optBtn" type="button">경로 최적화</button>
        <button id="shareBtn" type="button">모바일로 보내기(QR/링크)</button>
      </div>

      <div id="msg" class="msg"></div>

      <div id="progressWrap" class="progressWrap" hidden>
        <div class="spinner" aria-hidden="true"></div>
        <div>
          <div id="progressText" class="progressText">처리 중...</div>
          <div class="progressBar">
            <div id="progressBarFill" class="progressBarFill"></div>
          </div>
        </div>
      </div>
    </aside>

    <main class="right">
      <!-- 지도 -->
      <div id="map" class="map"></div>

      <!-- 네이버 지도 버튼 -->
      <div class="topbar">
        <button id="naverBtn" type="button" disabled>네이버 지도 열기(다음 목적지)</button>
      </div>

      <!-- PC → 모바일 공유(QR/링크) -->
      <div id="shareBox" class="shareBox" hidden>
        <div class="shareRow">
          <input id="shareUrl" readonly />
          <button id="copyBtn" type="button">복사</button>
        </div>
        <div id="qr"></div>
      </div>

      <!-- 결과 -->
      <div class="result">
        <h2>최적화 결과</h2>
        <ol id="resultList"></ol>
      </div>

      <div class="note">
        PC에서 주소 입력 → “모바일로 보내기(QR/링크)”로 휴대폰에서 열고,
        모바일에서는 “네이버 지도 열기(다음 목적지)”로 내비게이션을 실행하세요.
      </div>
    </main>
  </div>

  <!-- 1) 네이버 지도 웹 SDK (지도/마커/폴리라인을 그리기 위해 필요) -->
  <script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=ql4o2776tv"></script>

  <!-- 2) QR 코드 생성 라이브러리 (QR을 쓸 때만 필요) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

  <!-- 3) 앱 코드 -->
  <script src="app.js"></script>
</body>
</html>
